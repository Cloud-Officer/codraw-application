---
name: Cron Dependencies
'on':
  schedule:
  - cron: 0 9 * * 1
permissions:
  contents: read
  pull-requests: read
env:
  APT-PACKAGES: libyaml-dev
  NODE-CACHE: npm
  NODE-VERSION: 26.4.0
  PYTHON-CACHE: pip
  PYTHON-VERSION: 3.14.6
  RUBY-BUNDLER-CACHE: true
jobs:
  update_dependencies:
    name: Update Dependencies
    permissions:
      contents: read
      pull-requests: read
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
    - name: Setup
      uses: cloud-officer/ci-actions/setup@v2
      with:
        ssh-key: "${{secrets.SSH_KEY}}"
        github-token: "${{secrets.GH_PAT}}"
        node-version: "${{env.NODE-VERSION}}"
        node-cache: "${{env.NODE-CACHE}}"
        node-cache-dependency-path: js/*/package-lock.json
        apt-packages: "${{env.APT-PACKAGES}}"
        python-version: "${{env.PYTHON-VERSION}}"
        python-cache: "${{env.PYTHON-CACHE}}"
        ruby-bundler-cache: "${{env.RUBY-BUNDLER-CACHE}}"
    - name: Close Stale Dependency PRs
      shell: bash
      run: |
        prs=$(gh pr list --repo "${{github.repository}}" --search "Update Dependencies in:title" --state open --json number,headRefName --jq '.[] | "\(.number) \(.headRefName)"')

        if [ -n "$prs" ]; then
          while IFS=' ' read -r pr_number branch_name; do
            echo "Closing PR #${pr_number} and deleting branch ${branch_name}"
            gh pr close "${pr_number}" --repo "${{github.repository}}" --delete-branch --comment "Superseded by a newer dependency update."
          done <<< "$prs"
        else
          echo "No stale dependency update PRs found."
        fi
      env:
        GH_TOKEN: "${{secrets.GH_PAT}}"
    - name: Update Dependencies
      shell: bash
      run: |
        git config --global --add url."https://${GH_PAT}:x-oauth-basic@github.com/${{github.repository_owner}}/".insteadOf ssh://git@github.com:${{github.repository_owner}}/
        git config --global --add url."https://${GH_PAT}:x-oauth-basic@github.com/${{github.repository_owner}}/".insteadOf https://github.com/${{github.repository_owner}}/
        git config --global --add url."https://${GH_PAT}:x-oauth-basic@github.com/${{github.repository_owner}}/".insteadOf git@github.com:${{github.repository_owner}}/

        (cd js/ami-garbage-collector && npm upgrade)
        (cd js/env-start-stop && npm upgrade)
        (cd shell/tests && pip install pip-tools ; pip-compile --resolver=backtracking --upgrade --strip-extras --unsafe-package pip --unsafe-package setuptools --unsafe-package certifi --unsafe-package cuda-bindings --unsafe-package cuda-pathfinder --unsafe-package cuda-toolkit --unsafe-package nvidia-cublas --unsafe-package nvidia-cublas-cu12 --unsafe-package nvidia-cublas-cu13 --unsafe-package nvidia-cuda-cupti --unsafe-package nvidia-cuda-cupti-cu12 --unsafe-package nvidia-cuda-cupti-cu13 --unsafe-package nvidia-cuda-nvrtc --unsafe-package nvidia-cuda-nvrtc-cu12 --unsafe-package nvidia-cuda-nvrtc-cu13 --unsafe-package nvidia-cuda-runtime --unsafe-package nvidia-cuda-runtime-cu12 --unsafe-package nvidia-cuda-runtime-cu13 --unsafe-package nvidia-cudnn --unsafe-package nvidia-cudnn-cu12 --unsafe-package nvidia-cudnn-cu13 --unsafe-package nvidia-cufft --unsafe-package nvidia-cufft-cu12 --unsafe-package nvidia-cufft-cu13 --unsafe-package nvidia-cufile --unsafe-package nvidia-cufile-cu12 --unsafe-package nvidia-cufile-cu13 --unsafe-package nvidia-curand --unsafe-package nvidia-curand-cu12 --unsafe-package nvidia-curand-cu13 --unsafe-package nvidia-cusolver --unsafe-package nvidia-cusolver-cu12 --unsafe-package nvidia-cusolver-cu13 --unsafe-package nvidia-cusparse --unsafe-package nvidia-cusparse-cu12 --unsafe-package nvidia-cusparse-cu13 --unsafe-package nvidia-cusparselt --unsafe-package nvidia-cusparselt-cu12 --unsafe-package nvidia-cusparselt-cu13 --unsafe-package nvidia-nccl --unsafe-package nvidia-nccl-cu12 --unsafe-package nvidia-nccl-cu13 --unsafe-package nvidia-nvjitlink --unsafe-package nvidia-nvjitlink-cu12 --unsafe-package nvidia-nvjitlink-cu13 --unsafe-package nvidia-nvshmem --unsafe-package nvidia-nvshmem-cu12 --unsafe-package nvidia-nvshmem-cu13 --unsafe-package nvidia-nvtx --unsafe-package nvidia-nvtx-cu12 --unsafe-package nvidia-nvtx-cu13 --unsafe-package triton)
        bundle config set frozen false ; bundle update
      env:
        GH_PAT: "${{secrets.GH_PAT}}"
    - name: Licenses
      uses: cloud-officer/ci-actions/soup@v2
      with:
        ssh-key: "${{secrets.SSH_KEY}}"
        github-token: "${{secrets.GH_PAT}}"
        parameters: "--no_prompt"
        skip-checkout: 'true'
    - name: Create Pull Request
      uses: peter-evans/create-pull-request@v8
      with:
        commit-message: Update dependencies and soup files
        branch: update-dependencies-${{github.run_id}}
        title: Update Dependencies
        body: This PR updates the dependencies.
        token: "${{secrets.GH_PAT}}"
